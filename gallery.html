<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: #333;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    img, video, audio {
      width: 100%;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    video {
      height: auto;
    }

    .box {
      background: white;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>My Gallery</h1>

<div class="container">

  <!-- IMAGE -->
  <div class="box">
    <h3>Image</h3>
    <img src="download (40).jpeg" alt="image">
    <img src="10 Tips For Doing The Self Guided Tour Du Mont Blanc Hike As A Family.jpeg" alt="image">
    <img src="☁️ Mickey and Michelle on the Western Arthur Range, Tasmania ☁️.jpeg" alt="image">
  </div>

  <!-- VIDEO -->
  <div class="box">
    <h3>Video</h3>
    <video controls>
      <source src="Welcome _ OBS - Google Chrome 2025-08-30 22-37-51.mp4" type="video/mp4">
      Your browser does not support video.
    </video>
  </div>

  <!-- AUDIO -->
  <div class="box">
    <h3>Audio</h3>
    <audio controls>
      <source src="alexzavesa-calm-elegant-logo-519008.mp3" type="audio/mp3">
      Your browser does not support audio.
    </audio>
  </div>

</div>

</body>
</html>
